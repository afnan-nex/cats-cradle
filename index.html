<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cat's Cradle — Interactive String Art</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Orbitron','Courier New',monospace;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:none}

/* ── Camera background ── */
#webcam{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;transform:scaleX(-1)}

/* ── Overlay canvas ── */
#canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;pointer-events:none}

/* ── UI overlay ── */
#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(12px,3vw,28px)}

/* Title */
#title{font-size:clamp(14px,3vw,26px);font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#00e5ff;text-shadow:0 0 8px #00e5ff,0 0 20px #00e5ff80,0 0 40px #00e5ff40;opacity:.85;user-select:none}

/* Status bar */
#status-bar{display:flex;justify-content:space-between;align-items:flex-end}
#status{font-size:clamp(10px,1.8vw,14px);color:#aaccdd;text-shadow:0 0 6px #00e5ff60;transition:color .3s;user-select:none}
#fps{font-size:clamp(9px,1.4vw,12px);color:#668899;text-shadow:0 0 4px #00e5ff30;user-select:none}
#quality-badge{font-size:clamp(8px,1.2vw,11px);padding:2px 8px;border:1px solid #335;border-radius:3px;color:#668899;margin-left:10px;user-select:none}

/* Center message / error */
#center-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;text-align:center;pointer-events:none;transition:opacity .5s}
#center-msg h2{font-size:clamp(16px,3.5vw,28px);margin-bottom:12px;color:#00e5ff;text-shadow:0 0 12px #00e5ff}
#center-msg p{font-size:clamp(11px,2vw,15px);color:#8899aa;margin-bottom:20px;line-height:1.5}

/* Retry button */
#retry-btn{pointer-events:auto;font-family:inherit;font-size:clamp(12px,2vw,16px);padding:10px 28px;background:transparent;color:#00e5ff;border:1px solid #00e5ff;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;transition:all .25s;display:none;margin:0 auto}
#retry-btn:hover,#retry-btn:focus{background:#00e5ff22;box-shadow:0 0 16px #00e5ff60}

/* Spinner */
.spinner{width:40px;height:40px;border:3px solid #00e5ff33;border-top-color:#00e5ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Fade-in */
.fade-in{animation:fadeIn .6s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* Hidden utility */
.hidden{opacity:0!important;pointer-events:none!important}
</style>
</head>
<body>

<!-- Live camera feed (mirrored via CSS) -->
<video id="webcam" autoplay playsinline muted></video>

<!-- All neon graphics rendered here -->
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="title">Cat's Cradle by AFNAN</div>
  <div id="status-bar">
    <span id="status">Initializing…</span>
    <span><span id="fps">-- FPS</span><span id="quality-badge">--</span></span>
  </div>
</div>

<!-- Center overlay for loading / errors -->
<div id="center-msg" class="fade-in">
  <div class="spinner" id="spinner"></div>
  <h2 id="msg-title">Initializing Hand Tracking</h2>
  <p id="msg-body">Camera access required</p>
  <button id="retry-btn">Retry Camera</button>
</div>

<script type="module">
// ================================================================
//  SECTION 1 — DYNAMIC IMPORT OF MEDIAPIPE
// ================================================================
let HandLandmarker, FilesetResolver;
try {
  const vision = await import(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
  );
  HandLandmarker = vision.HandLandmarker;
  FilesetResolver = vision.FilesetResolver;
} catch (err) {
  console.error("MediaPipe load failed:", err);
  showFatalError(
    "Failed to load hand tracking library.",
    "Please check your internet connection and reload."
  );
}

// ================================================================
//  SECTION 2 — CONFIGURATION
// ================================================================
const CFG = {
  // Camera
  cameraIdeal: { width: 1280, height: 720 },
  cameraFacing: "user",

  // Hand tracking
  numHands: 2,
  minDetectionConfidence: 0.55,
  minTrackingConfidence: 0.5,

  // Landmark smoothing (EMA alpha: lower = smoother)
  smoothAlpha: 0.35,

  // Touch detection (pixels)
  touchEnterDist: 42,
  touchExitDist: 62,

  // Particles
  maxParticlesHigh: 300,
  maxParticlesMed: 150,
  maxParticlesLow: 60,
  particleSpawnRate: 6,

  // Strings
  stringCurveAmount: 0.06,

  // Performance
  fpsSampleFrames: 30,
  fpsHighThreshold: 50,
  fpsLowThreshold: 30,

  // Visual
  darkOverlayAlpha: 0.35,
  landmarkDotRadius: 4,
  fingertipDotRadius: 6,
};

// Fingertip landmark indices
const FINGERTIPS = [4, 8, 12, 16, 20];
const FINGER_MCP = [1, 5, 9, 13, 17];
const ALL_LANDMARK_COUNT = 21;

// Color palette
const PAL = {
  cyan:    { r: 0,   g: 229, b: 255, hex: "#00e5ff" },
  magenta: { r: 255, g: 0,   b: 229, hex: "#ff00e5" },
  green:   { r: 0,   g: 255, b: 136, hex: "#00ff88" },
  purple:  { r: 170, g: 68,  b: 255, hex: "#aa44ff" },
  orange:  { r: 255, g: 140, b: 0,   hex: "#ff8c00" },
  white:   { r: 255, g: 255, b: 255, hex: "#ffffff" },
};

// Hand color assignment (index → palette entry)
const HAND_COLORS = [PAL.cyan, PAL.magenta];

// ================================================================
//  SECTION 3 — DOM REFERENCES
// ================================================================
const videoEl    = document.getElementById("webcam");
const canvasEl   = document.getElementById("canvas");
const ctx        = canvasEl.getContext("2d", { alpha: true });
const statusEl   = document.getElementById("status");
const fpsEl      = document.getElementById("fps");
const qualityEl  = document.getElementById("quality-badge");
const centerMsg  = document.getElementById("center-msg");
const msgTitle   = document.getElementById("msg-title");
const msgBody    = document.getElementById("msg-body");
const spinnerEl  = document.getElementById("spinner");
const retryBtn   = document.getElementById("retry-btn");

// ================================================================
//  SECTION 4 — APPLICATION STATE
// ================================================================
const state = {
  running: false,
  cameraReady: false,
  trackerReady: false,
  animFrameId: null,
  lastTime: 0,
  width: 0,
  height: 0,
  dpr: 1,
  quality: "HIGH",     // HIGH | MEDIUM | LOW
  handsVisible: 0,
  // Smoothed landmarks per hand: array of { x, y, z, visible }
  smoothed: [null, null],
  // Touch state: Set of active touch pair keys
  activeTouches: new Set(),
  // Time accumulator for pulsing effects
  time: 0,
};

// ================================================================
//  SECTION 5 — UTILITY HELPERS
// ================================================================
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function dist2D(ax, ay, bx, by) { const dx = bx - ax, dy = by - ay; return Math.sqrt(dx * dx + dy * dy); }
function rgba(c, a) { return `rgba(${c.r},${c.g},${c.b},${a})`; }

// Show the center overlay with a message
function showCenterMessage(title, body, showRetry = false) {
  centerMsg.classList.remove("hidden");
  msgTitle.textContent = title;
  msgBody.textContent = body;
  retryBtn.style.display = showRetry ? "block" : "none";
  spinnerEl.style.display = showRetry ? "none" : "block";
}
function hideCenterMessage() { centerMsg.classList.add("hidden"); }

function showFatalError(title, body) {
  showCenterMessage(title, body, true);
  statusEl.textContent = "Error";
  statusEl.style.color = "#ff4466";
}

function setStatus(text) { statusEl.textContent = text; }

// ================================================================
//  SECTION 6 — PERFORMANCE MONITOR
// ================================================================
const perf = {
  samples: new Float32Array(CFG.fpsSampleFrames),
  idx: 0,
  filled: false,
  fps: 60,

  /** Record a frame delta (seconds) */
  record(dt) {
    this.samples[this.idx] = dt;
    this.idx = (this.idx + 1) % CFG.fpsSampleFrames;
    if (this.idx === 0) this.filled = true;
    const count = this.filled ? CFG.fpsSampleFrames : this.idx;
    let sum = 0;
    for (let i = 0; i < count; i++) sum += this.samples[i];
    this.fps = count / sum;
  },

  /** Determine quality tier from rolling FPS */
  evaluate() {
    if (this.fps >= CFG.fpsHighThreshold) return "HIGH";
    if (this.fps >= CFG.fpsLowThreshold) return "MEDIUM";
    return "LOW";
  },
};

// ================================================================
//  SECTION 7 — GLOW SPRITE CACHE
// ================================================================
/** Pre-render radial glow sprites so we never create gradients per-frame */
const glowCache = new Map();

function getGlowSprite(radius, color) {
  const key = `${radius}_${color.hex}`;
  if (glowCache.has(key)) return glowCache.get(key);
  const size = radius * 2;
  const off = document.createElement("canvas");
  off.width = size;
  off.height = size;
  const oc = off.getContext("2d");
  const g = oc.createRadialGradient(radius, radius, 0, radius, radius, radius);
  g.addColorStop(0, rgba(color, 1));
  g.addColorStop(0.25, rgba(color, 0.6));
  g.addColorStop(0.6, rgba(color, 0.15));
  g.addColorStop(1, rgba(color, 0));
  oc.fillStyle = g;
  oc.fillRect(0, 0, size, size);
  glowCache.set(key, off);
  return off;
}

// Pre-render vignette overlay (rendered once, drawn each frame)
let vignetteSprite = null;
function buildVignette(w, h) {
  const off = document.createElement("canvas");
  off.width = w; off.height = h;
  const oc = off.getContext("2d");
  const g = oc.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.25, w / 2, h / 2, Math.max(w, h) * 0.75);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,10,0.55)");
  oc.fillStyle = g;
  oc.fillRect(0, 0, w, h);
  vignetteSprite = off;
}

// ================================================================
//  SECTION 8 — PARTICLE POOL
// ================================================================
class ParticlePool {
  constructor(maxSize) {
    this.max = maxSize;
    this.pool = [];
    this.active = [];
    for (let i = 0; i < maxSize; i++) {
      this.pool.push({ x:0, y:0, vx:0, vy:0, life:0, maxLife:1, color: PAL.cyan, size:3 });
    }
  }

  resize(newMax) {
    while (this.pool.length + this.active.length < newMax) {
      this.pool.push({ x:0, y:0, vx:0, vy:0, life:0, maxLife:1, color: PAL.cyan, size:3 });
    }
    this.max = newMax;
  }

  spawn(x, y, vx, vy, life, color, size) {
    if (this.active.length >= this.max) {
      // Recycle oldest
      const p = this.active.shift();
      this.pool.push(p);
    }
    const p = this.pool.pop();
    if (!p) return null;
    p.x = x; p.y = y; p.vx = vx; p.vy = vy;
    p.life = life; p.maxLife = life; p.color = color; p.size = size;
    this.active.push(p);
    return p;
  }

  burst(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 120;
      const life = 0.4 + Math.random() * 0.8;
      const size = 2 + Math.random() * 4;
      this.spawn(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, life, color, size);
    }
  }

  update(dt) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      const p = this.active[i];
      p.life -= dt;
      if (p.life <= 0) {
        this.active.splice(i, 1);
        this.pool.push(p);
        continue;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 30 * dt; // gentle gravity
      p.vx *= 0.98;    // drag
      p.vy *= 0.98;
    }
  }

  clear() {
    while (this.active.length) this.pool.push(this.active.pop());
  }
}

let particles;

// ================================================================
//  SECTION 9 — LANDMARK SMOOTHER
// ================================================================
/**
 * Applies exponential moving average to raw MediaPipe landmarks
 * to eliminate jitter while keeping responsiveness.
 */
class LandmarkSmoother {
  constructor(alpha = CFG.smoothAlpha) {
    this.alpha = alpha;
    this.prev = [null, null];
  }

  /**
   * @param {Array<Array<{x,y,z}>>} rawLandmarks — from MediaPipe
   * @returns {Array<Array<{x,y,z}>|null>} smoothed landmarks (same shape)
   */
  update(rawLandmarks) {
    if (!rawLandmarks || rawLandmarks.length === 0) {
      this.prev = [null, null];
      return [];
    }
    const out = [];
    for (let h = 0; h < rawLandmarks.length; h++) {
      const raw = rawLandmarks[h];
      if (!this.prev[h]) {
        // First frame: seed directly
        this.prev[h] = raw.map(lm => ({ x: lm.x, y: lm.y, z: lm.z }));
      } else {
        const smoothed = new Array(raw.length);
        for (let i = 0; i < raw.length; i++) {
          const prev = this.prev[h][i];
          smoothed[i] = {
            x: lerp(prev.x, raw[i].x, this.alpha),
            y: lerp(prev.y, raw[i].y, this.alpha),
            z: lerp(prev.z, raw[i].z, this.alpha),
          };
        }
        this.prev[h] = smoothed;
      }
      out.push(this.prev[h]);
    }
    // Clear unused hand slots
    for (let h = rawLandmarks.length; h < 2; h++) this.prev[h] = null;
    return out;
  }
}

const smoother = new LandmarkSmoother();

// ================================================================
//  SECTION 10 — TOUCH DETECTION (with hysteresis)
// ================================================================
function makeTouchKey(h1, f1, h2, f2) {
  // Ensure canonical order for set lookup
  const a = `${h1}_${f1}`, b = `${h2}_${f2}`;
  return a < b ? `${a}-${b}` : `${b}-${a}`;
}

function detectTouches(hands) {
  const newTouches = new Set();
  const touchPoints = [];

  // Intra-hand fingertip proximity
  for (let h = 0; h < hands.length; h++) {
    const hand = hands[h];
    if (!hand) continue;
    for (let i = 0; i < FINGERTIPS.length; i++) {
      for (let j = i + 1; j < FINGERTIPS.length; j++) {
        const a = hand[FINGERTIPS[i]], b = hand[FINGERTIPS[j]];
        const dx = (a.x - b.x) * state.width;
        const dy = (a.y - b.y) * state.height;
        const d = Math.sqrt(dx * dx + dy * dy);
        const key = makeTouchKey(h, i, h, j);
        const wasActive = state.activeTouches.has(key);
        if ((wasActive && d < CFG.touchExitDist) || (!wasActive && d < CFG.touchEnterDist)) {
          newTouches.add(key);
          touchPoints.push({
            x: (1 - (a.x + b.x) * 0.5) * state.width,
            y: (a.y + b.y) * 0.5 * state.height,
            color: HAND_COLORS[h] || PAL.cyan,
          });
        }
      }
    }
  }

  // Inter-hand fingertip proximity
  if (hands.length === 2 && hands[0] && hands[1]) {
    for (let i = 0; i < FINGERTIPS.length; i++) {
      for (let j = 0; j < FINGERTIPS.length; j++) {
        const a = hands[0][FINGERTIPS[i]], b = hands[1][FINGERTIPS[j]];
        const dx = (a.x - b.x) * state.width;
        const dy = (a.y - b.y) * state.height;
        const d = Math.sqrt(dx * dx + dy * dy);
        const key = makeTouchKey(0, i, 1, j);
        const wasActive = state.activeTouches.has(key);
        if ((wasActive && d < CFG.touchExitDist * 1.3) || (!wasActive && d < CFG.touchEnterDist * 1.3)) {
          newTouches.add(key);
          touchPoints.push({
            x: (1 - (a.x + b.x) * 0.5) * state.width,
            y: (a.y + b.y) * 0.5 * state.height,
            color: PAL.green,
          });
        }
      }
    }
  }

  state.activeTouches = newTouches;
  return touchPoints;
}

// ================================================================
//  SECTION 11 — STRING CONNECTION CALCULATOR
// ================================================================
/**
 * Computes all string connections for the current frame.
 * Returns arrays of line segments grouped by color for batched rendering.
 */
function computeStrings(hands) {
  const groups = { cyan: [], magenta: [], green: [], purple: [], dim: [] };
  const w = state.width, h = state.height;

  for (let hi = 0; hi < hands.length; hi++) {
    const hand = hands[hi];
    if (!hand) continue;
    const col = hi === 0 ? "cyan" : "magenta";

    // ── Finger bone chains (tip → DIP → PIP → MCP → wrist) ──
    const fingerRoots = [1, 5, 9, 13, 17]; // CMC/MCP for each finger
    const fingerChain = [
      [0, 1, 2, 3, 4],   // thumb
      [0, 5, 6, 7, 8],   // index
      [0, 9, 10, 11, 12], // middle
      [0, 13, 14, 15, 16],// ring
      [0, 17, 18, 19, 20] // pinky
    ];
    for (const chain of fingerChain) {
      for (let i = 0; i < chain.length - 1; i++) {
        const a = hand[chain[i]], b = hand[chain[i + 1]];
        groups[col].push({
          x1: (1 - a.x) * w, y1: a.y * h,
          x2: (1 - b.x) * w, y2: b.y * h,
          tension: 0.5,
        });
      }
    }

    // ── Fingertip web (connect all fingertips to each other) ──
    for (let i = 0; i < FINGERTIPS.length; i++) {
      for (let j = i + 1; j < FINGERTIPS.length; j++) {
        const a = hand[FINGERTIPS[i]], b = hand[FINGERTIPS[j]];
        const px1 = (1 - a.x) * w, py1 = a.y * h;
        const px2 = (1 - b.x) * w, py2 = b.y * h;
        const d = dist2D(px1, py1, px2, py2);
        const tension = clamp(1 - d / (w * 0.4), 0, 1);
        groups[col].push({ x1: px1, y1: py1, x2: px2, y2: py2, tension });
      }
    }

    // ── Cross-web (MCP to non-adjacent fingertips) ──
    for (let i = 0; i < 5; i++) {
      for (let j = 0; j < 5; j++) {
        if (i === j) continue;
        const a = hand[FINGER_MCP[i]], b = hand[FINGERTIPS[j]];
        const px1 = (1 - a.x) * w, py1 = a.y * h;
        const px2 = (1 - b.x) * w, py2 = b.y * h;
        groups.dim.push({ x1: px1, y1: py1, x2: px2, y2: py2, tension: 0.2 });
      }
    }
  }

  // ── Inter-hand bridge strings ──
  if (hands.length === 2 && hands[0] && hands[1]) {
    for (let i = 0; i < FINGERTIPS.length; i++) {
      // Corresponding fingertips
      const a = hands[0][FINGERTIPS[i]], b = hands[1][FINGERTIPS[i]];
      const px1 = (1 - a.x) * w, py1 = a.y * h;
      const px2 = (1 - b.x) * w, py2 = b.y * h;
      const d = dist2D(px1, py1, px2, py2);
      const tension = clamp(1 - d / (w * 0.6), 0, 1);
      groups.purple.push({ x1: px1, y1: py1, x2: px2, y2: py2, tension });

      // Cross connections (offset by 1) for web pattern
      if (i < FINGERTIPS.length - 1) {
        const c = hands[1][FINGERTIPS[i + 1]];
        const px3 = (1 - c.x) * w, py3 = c.y * h;
        groups.purple.push({ x1: px1, y1: py1, x2: px3, y2: py3, tension: tension * 0.5 });
      }
    }
  }

  return groups;
}

// ================================================================
//  SECTION 12 — RENDERER
// ================================================================

/**
 * Draw a batch of strings with layered glow effect.
 * Avoids shadowBlur; uses multiple stroked paths at different widths/opacities.
 */
function drawStringGroup(segments, color, baseWidth, quality) {
  if (segments.length === 0) return;

  // Determine glow layers based on quality
  let layers;
  if (quality === "HIGH") {
    layers = [
      { dw: 14, a: 0.04 },
      { dw: 8,  a: 0.09 },
      { dw: 4,  a: 0.22 },
      { dw: 0,  a: 0.85 },
    ];
  } else if (quality === "MEDIUM") {
    layers = [
      { dw: 8, a: 0.08 },
      { dw: 0, a: 0.8 },
    ];
  } else {
    layers = [{ dw: 0, a: 0.7 }];
  }

  const useCurves = quality === "HIGH";
  const t = state.time;

  for (const layer of layers) {
    ctx.globalAlpha = layer.a;
    ctx.lineWidth = baseWidth + layer.dw;
    ctx.strokeStyle = color;
    ctx.lineCap = "round";
    ctx.beginPath();

    for (let i = 0; i < segments.length; i++) {
      const s = segments[i];
      // Skip off-screen segments
      if (s.x1 < -50 && s.x2 < -50) continue;
      if (s.x1 > state.width + 50 && s.x2 > state.width + 50) continue;
      if (s.y1 < -50 && s.y2 < -50) continue;
      if (s.y1 > state.height + 50 && s.y2 > state.height + 50) continue;

      ctx.moveTo(s.x1, s.y1);
      if (useCurves && layer.dw <= 4) {
        // Subtle bezier curve for organic look
        const mx = (s.x1 + s.x2) * 0.5;
        const my = (s.y1 + s.y2) * 0.5;
        const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
        const curve = CFG.stringCurveAmount * (0.5 + 0.5 * Math.sin(t * 2 + i));
        ctx.quadraticCurveTo(mx + dy * curve, my - dx * curve, s.x2, s.y2);
      } else {
        ctx.lineTo(s.x2, s.y2);
      }
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

/** Draw glowing landmark dots */
function drawLandmarks(hands, quality) {
  const w = state.width, h = state.height;
  const baseR = CFG.landmarkDotRadius;
  const tipR = CFG.fingertipDotRadius;
  const pulse = 1 + 0.15 * Math.sin(state.time * 4);

  for (let hi = 0; hi < hands.length; hi++) {
    const hand = hands[hi];
    if (!hand) continue;
    const col = HAND_COLORS[hi] || PAL.cyan;
    const sprite = getGlowSprite(Math.round(tipR * 3 * pulse), col);

    for (let i = 0; i < hand.length; i++) {
      const lm = hand[i];
      const px = (1 - lm.x) * w;
      const py = lm.y * h;

      // Skip off-screen
      if (px < -20 || px > w + 20 || py < -20 || py > h + 20) continue;

      const isTip = FINGERTIPS.includes(i);
      const r = isTip ? tipR * pulse : baseR;

      if (quality !== "LOW") {
        // Glow sprite
        const glowR = r * 3;
        ctx.globalAlpha = isTip ? 0.7 : 0.35;
        ctx.drawImage(sprite, px - glowR, py - glowR, glowR * 2, glowR * 2);
      }

      // Core dot
      ctx.globalAlpha = isTip ? 1 : 0.6;
      ctx.fillStyle = isTip ? PAL.white.hex : col.hex;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

/** Draw particles using pre-rendered sprites */
function drawParticles(quality) {
  const active = particles.active;
  if (active.length === 0) return;

  const useSprites = quality !== "LOW";

  for (let i = 0; i < active.length; i++) {
    const p = active[i];
    const lifeRatio = p.life / p.maxLife;
    const alpha = lifeRatio * lifeRatio; // quadratic fade
    const r = p.size * (0.5 + 0.5 * lifeRatio);

    // Skip off-screen
    if (p.x < -20 || p.x > state.width + 20 || p.y < -20 || p.y > state.height + 20) continue;

    ctx.globalAlpha = alpha;

    if (useSprites) {
      const spriteR = Math.max(4, Math.round(r * 3));
      const sprite = getGlowSprite(spriteR, p.color);
      ctx.drawImage(sprite, p.x - spriteR, p.y - spriteR, spriteR * 2, spriteR * 2);
    } else {
      ctx.fillStyle = p.color.hex;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

/** Full frame render */
function render(dt) {
  const w = state.width, h = state.height;
  const q = state.quality;

  // 1. Clear canvas
  ctx.clearRect(0, 0, w, h);

  // 2. Dark overlay to make neon pop over camera
  ctx.fillStyle = `rgba(0,0,12,${CFG.darkOverlayAlpha})`;
  ctx.fillRect(0, 0, w, h);

  // Get smoothed hands
  const hands = [state.smoothed[0], state.smoothed[1]].filter(Boolean);

  if (hands.length === 0) {
    // Draw vignette and bail
    if (vignetteSprite) ctx.drawImage(vignetteSprite, 0, 0, w, h);
    return;
  }

  // 3. Set additive blending for neon
  ctx.globalCompositeOperation = "lighter";

  // 4. Compute & draw strings (batched by color)
  const groups = computeStrings(hands);
  drawStringGroup(groups.dim, rgba(PAL.cyan, 0.5), 0.5, q === "HIGH" ? "MEDIUM" : "LOW");
  drawStringGroup(groups.cyan, PAL.cyan.hex, 1.5, q);
  drawStringGroup(groups.magenta, PAL.magenta.hex, 1.5, q);
  drawStringGroup(groups.purple, PAL.purple.hex, 1.2, q);
  drawStringGroup(groups.green, PAL.green.hex, 2.0, q);

  // 5. Landmark dots
  drawLandmarks(hands, q);

  // 6. Particles
  drawParticles(q);

  // 7. Reset composite
  ctx.globalCompositeOperation = "source-over";

  // 8. Vignette
  if (vignetteSprite) ctx.drawImage(vignetteSprite, 0, 0, w, h);

  // 9. Detect touches → spawn particles (after render to use current positions)
  const touchPoints = detectTouches(hands);
  const spawnCount = q === "HIGH" ? CFG.particleSpawnRate : q === "MEDIUM" ? 3 : 1;
  for (const tp of touchPoints) {
    particles.burst(tp.x, tp.y, spawnCount, tp.color);
  }
}

// ================================================================
//  SECTION 13 — CANVAS SIZING
// ================================================================
function resizeCanvas() {
  state.dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2x for perf
  state.width = window.innerWidth;
  state.height = window.innerHeight;
  canvasEl.width = state.width * state.dpr;
  canvasEl.height = state.height * state.dpr;
  canvasEl.style.width = state.width + "px";
  canvasEl.style.height = state.height + "px";
  ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  buildVignette(state.width, state.height);
}

// ================================================================
//  SECTION 14 — CAMERA MANAGER
// ================================================================
let cameraStream = null;
let cameraInitInProgress = false;

async function initCamera() {
  if (cameraInitInProgress) return false;
  if (cameraStream) return true; // Already initialized

  cameraInitInProgress = true;
  showCenterMessage("Camera Access", "Requesting camera permission…", false);
  setStatus("Requesting camera…");

  try {
    const constraints = {
      video: {
        facingMode: CFG.cameraFacing,
        width: { ideal: CFG.cameraIdeal.width },
        height: { ideal: CFG.cameraIdeal.height },
      },
      audio: false,
    };

    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = cameraStream;

    await new Promise((resolve, reject) => {
      videoEl.onloadedmetadata = () => {
        videoEl.play().then(resolve).catch(resolve); // play may reject on some browsers, that's ok
      };
      setTimeout(resolve, 5000); // safety timeout
    });

    state.cameraReady = true;
    setStatus("Camera ready");
    cameraInitInProgress = false;
    return true;
  } catch (err) {
    console.warn("Camera error:", err);
    state.cameraReady = false;
    cameraInitInProgress = false;
    cameraStream = null;

    if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
      showCenterMessage("Camera Denied", "Please allow camera access and click Retry.", true);
    } else if (err.name === "NotFoundError") {
      showFatalError("No Camera Found", "Please connect a camera and click Retry.");
    } else {
      showCenterMessage("Camera Error", err.message || "Unknown error. Click Retry.", true);
    }
    setStatus("Camera error");
    return false;
  }
}

function cleanupCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  videoEl.srcObject = null;
  state.cameraReady = false;
}

// ================================================================
//  SECTION 15 — MEDIAPIPE HAND TRACKER
// ================================================================
let handLandmarker = null;
let trackerInitInProgress = false;

async function initTracker() {
  if (trackerInitInProgress) return false;
  if (handLandmarker) return true; // Already initialized
  if (!HandLandmarker || !FilesetResolver) {
    showFatalError("Library Missing", "Hand tracking library failed to load.");
    return false;
  }

  trackerInitInProgress = true;
  showCenterMessage("Loading", "Initializing hand tracking model…", false);
  setStatus("Loading model…");

  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO",
      numHands: CFG.numHands,
      minHandDetectionConfidence: CFG.minDetectionConfidence,
      minTrackingConfidence: CFG.minTrackingConfidence,
      minHandPresenceConfidence: CFG.minDetectionConfidence,
    });

    state.trackerReady = true;
    setStatus("Tracking active");
    trackerInitInProgress = false;
    return true;
  } catch (err) {
    console.error("Tracker init failed:", err);
    state.trackerReady = false;
    trackerInitInProgress = false;

    // Attempt CPU fallback
    try {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
          delegate: "CPU",
        },
        runningMode: "VIDEO",
        numHands: CFG.numHands,
        minHandDetectionConfidence: CFG.minDetectionConfidence,
        minTrackingConfidence: CFG.minTrackingConfidence,
      });
      state.trackerReady = true;
      setStatus("Tracking (CPU mode)");
      return true;
    } catch (fallbackErr) {
      console.error("CPU fallback also failed:", fallbackErr);
      showFatalError("Tracking Error", "Could not initialize hand tracking. Please reload.");
      return false;
    }
  }
}

// ================================================================
//  SECTION 16 — MAIN LOOP
// ================================================================
function mainLoop(timestamp) {
  state.animFrameId = requestAnimationFrame(mainLoop);

  // Delta time in seconds, capped to avoid spiral of death
  const dt = Math.min((timestamp - state.lastTime) / 1000, 0.05);
  state.lastTime = timestamp;
  state.time += dt;

  // Performance tracking
  if (dt > 0) {
    perf.record(dt);
    state.quality = perf.evaluate();
  }

  // Update UI counters (throttled)
  if (Math.floor(timestamp / 500) !== Math.floor((timestamp - dt * 1000) / 500)) {
    fpsEl.textContent = `${Math.round(perf.fps)} FPS`;
    qualityEl.textContent = state.quality;
  }

  // Hand detection (only when video is ready)
  if (state.trackerReady && state.cameraReady && videoEl.readyState >= 2) {
    try {
      const results = handLandmarker.detectForVideo(videoEl, timestamp);
      const raw = results.landmarks || [];
      state.smoothed = smoother.update(raw);
      state.handsVisible = state.smoothed.filter(Boolean).length;

      // Status text
      if (state.handsVisible === 0) {
        setStatus("Show your hands");
      } else {
        setStatus(`Tracking ${state.handsVisible} hand${state.handsVisible > 1 ? "s" : ""}`);
      }

      // Hide center message when hands are visible
      if (state.handsVisible > 0 && !centerMsg.classList.contains("hidden")) {
        hideCenterMessage();
      }
    } catch (err) {
      console.warn("Detection error:", err);
    }
  }

  // Update particles
  particles.update(dt);

  // Render
  render(dt);
}

function startLoop() {
  if (state.animFrameId) return; // already running
  state.lastTime = performance.now();
  state.animFrameId = requestAnimationFrame(mainLoop);
  state.running = true;
}

function stopLoop() {
  if (state.animFrameId) {
    cancelAnimationFrame(state.animFrameId);
    state.animFrameId = null;
  }
  state.running = false;
}

// ================================================================
//  SECTION 17 — APPLICATION BOOTSTRAP
// ================================================================
async function boot() {
  // Initialize particle pool
  particles = new ParticlePool(CFG.maxParticlesHigh);

  // Size canvas
  resizeCanvas();

  // Initialize camera
  const camOk = await initCamera();
  if (!camOk) {
    // Start render loop anyway (shows dark overlay + vignette)
    startLoop();
    return;
  }

  // Initialize tracker
  const trackerOk = await initTracker();
  if (!trackerOk) {
    startLoop();
    return;
  }

  // All good — hide loading and start
  showCenterMessage("Ready", "Show your hands to begin", false);
  setTimeout(() => {
    if (state.handsVisible === 0) hideCenterMessage();
  }, 3000);

  startLoop();
}

// ================================================================
//  SECTION 18 — EVENT HANDLERS
// ================================================================

// Resize (debounced)
let resizeTimer = 0;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resizeCanvas();
  }, 100);
});

// Orientation change
window.addEventListener("orientationchange", () => {
  setTimeout(resizeCanvas, 200);
});

// Visibility change — pause/resume
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopLoop();
  } else {
    startLoop();
  }
});

// Retry button
retryBtn.addEventListener("click", async () => {
  retryBtn.style.display = "none";
  // Clean up previous attempts
  cleanupCamera();
  if (handLandmarker) {
    try { handLandmarker.close(); } catch (_) { /* ignore */ }
    handLandmarker = null;
    state.trackerReady = false;
  }
  trackerInitInProgress = false;
  cameraInitInProgress = false;
  smoother.prev = [null, null];
  particles.clear();

  // Reboot
  await boot();
});

// Cleanup on unload
window.addEventListener("beforeunload", () => {
  stopLoop();
  cleanupCamera();
  if (handLandmarker) {
    try { handLandmarker.close(); } catch (_) { /* ignore */ }
    handLandmarker = null;
  }
  particles.clear();
  glowCache.clear();
});

// Handle lost camera stream
videoEl.addEventListener("suspend", () => {
  console.warn("Video stream suspended");
});
videoEl.addEventListener("stalled", () => {
  console.warn("Video stream stalled");
});

// Prevent context menu on long press (mobile)
document.addEventListener("contextmenu", e => e.preventDefault());

// ================================================================
//  SECTION 19 — START
// ================================================================
boot();
</script>
</body>
